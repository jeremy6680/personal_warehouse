version: 2

seeds:
  - name: author_countries
    description: >
      Manual mapping of author names to their country of origin or nationality.
      Used to enrich int_books__unified with a country dimension.
      Values must be case-insensitively unique — the join normalizes both sides with
      lower/trim, so "Young-Ha Kim" and "Young-ha Kim" are the same key and would
      fan out every matching row. The unique test on author covers exact duplicates
      only; verify lowercase uniqueness manually when adding new rows.
    config:
      tags: ["seeds", "books", "reference"]
    columns:
      - name: author
        description: Author name as it appears in BookBuddy or Goodreads.
        tests:
          - unique
          - not_null
      - name: country
        description: Country of origin or nationality of the author (e.g., France, United States).
        tests:
          - not_null

  - name: director_countries
    description: >
      Manual mapping of director names to their country of origin or nationality.
      Used to enrich int_movies__unified with a country dimension.
      Only the primary director (first entry in the comma-separated directors field
      from MovieBuddy) is used for the join. Values must match the primary director
      name exactly (case-insensitive — the join normalizes both sides with lower/trim).
    config:
      tags: ["seeds", "films", "reference"]
    columns:
      - name: director
        description: Director name as it appears first in the MovieBuddy directors field.
        tests:
          - unique
          - not_null
      - name: country
        description: Country of origin or nationality of the director (e.g., United Kingdom, Japan).
        tests:
          - not_null

  - name: artist_countries
    description: >
      Manual mapping of artist names to their country of origin or nationality.
      Used to enrich int_music__collection with a country dimension.
      Values must match the artist field in MusicBuddy exactly
      (case-insensitive — the join normalizes both sides with lower/trim).
    config:
      tags: ["seeds", "music", "reference"]
    columns:
      - name: artist
        description: Artist name as it appears in MusicBuddy.
        tests:
          - unique
          - not_null
      - name: country
        description: Country of origin or nationality of the artist (e.g., United States, Sweden).
        tests:
          - not_null

  - name: film_countries
    description: >
      Manual mapping of (title, release_year) to country of origin for Letterboxd-only
      films that carry no director data. Used as a fallback country source in
      int_movies__unified for the letterboxd_only case, where director_countries cannot
      be applied. Country follows the same convention as director_countries: primary
      production country or director nationality, whichever is most representative.
      The join key is lower(trim(title)) + release_year, so titles must match the
      Letterboxd film_name exactly (case-insensitive). Uniqueness is enforced on
      the (title, release_year) combination — same-named films from different years
      are valid distinct rows (e.g. Mother 2009 vs MOTHER 2020).
    config:
      tags: ["seeds", "films", "reference"]
      column_types:
        release_year: INT64
    columns:
      - name: title
        description: Film title as it appears in the Letterboxd export (case-insensitive join key).
        tests:
          - not_null
      - name: release_year
        description: Release year of the film. Combined with title to form the unique join key.
        tests:
          - not_null
      - name: country
        description: Primary production country or director nationality (e.g., France, Japan, United States).
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - title
            - release_year

  - name: country_iso_codes
    description: >
      Reference mapping of country names (as used in author_countries, director_countries,
      and artist_countries seeds) to ISO 3166-1 alpha-3 codes. Used to enrich
      mrt_media__country_index with a standardised country code column (iso_alpha3)
      required by the Evidence.dev AreaMap choropleth component.
      Join key is lower(trim(country_name)) — must match the country values
      in the three domain seeds exactly (case-insensitive).
    config:
      tags: ["seeds", "geography", "reference"]
    columns:
      - name: country_name
        description: Country name as it appears in the domain seeds (e.g., "United States", "South Korea").
        tests:
          - unique
          - not_null
      - name: iso_alpha3
        description: >
          ISO 3166-1 alpha-3 three-letter country code (e.g., "USA", "KOR").
          Used as the join key for the Evidence AreaMap GeoJSON basemap.
        tests:
          - unique
          - not_null

  - name: genre_mapping
    description: >
      Cross-domain mapping of raw genre values (as exported by BookBuddy, MovieBuddy,
      and MusicBuddy) to normalised French labels. Centralises all genre normalisation
      logic in a single auditable seed — no genre logic lives in staging or mart.
      Normalisation is applied in the intermediate layer: int_books__unified,
      int_movies__unified, int_music__unified (and future int_manga__unified,
      int_anime__unified).
      Rows with an empty normalized_genre are parasitic values (export artefacts,
      metadata tags, overly specific subjects) that are filtered out in the
      intermediate layer via WHERE normalized_genre IS NOT NULL.
      See ADR-022 for the full rationale.
    config:
      tags: ["seeds", "shared", "reference"]
    columns:
      - name: domain
        description: >
          Source domain the raw genre belongs to. One of: books, movies, music.
          Future values: manga, anime.
        tests:
          - not_null
          - accepted_values:
              values: ["books", "movies", "music", "manga", "anime"]
      - name: raw_genre
        description: >
          Genre value exactly as it appears in the source CSV export
          (BookBuddy genre column, MovieBuddy genres column after SPLIT,
          MusicBuddy genres column after SPLIT). Case-sensitive — the join
          in intermediate normalizes both sides with lower/trim.
        tests:
          - not_null
      - name: normalized_genre
        description: >
          Normalised French genre label exposed in the mart layer and dashboard.
          Empty string means the raw value is a parasitic tag to be filtered out
          (e.g. "In library", "& Country", "TV Movie", "Non-Music").
          NULL and empty string are treated equivalently in the intermediate filter.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - domain
            - raw_genre
  - name: author_name_mapping
    description: >
      Manual mapping of author name variants to their canonical form.
      Applied in int_books__unified before cross-source matching to prevent
      duplicate author entries caused by inconsistent naming between BookBuddy
      and Goodreads (ADR-023).
      Join key is lower(trim(raw_name)) — must match the author field in staging
      exactly (case-insensitive).
    config:
      tags: ["seeds", "shared", "reference"]
    columns:
      - name: raw_name
        description: Author name variant as it appears in the source export.
        tests:
          - unique
          - not_null
      - name: canonical_name
        description: Canonical author name to use in the unified model (e.g., "Hubert Selby Jr.").
        tests:
          - not_null
