# models/staging/csv/_csv__sources.yml
# Documentation: models/staging/csv/_csv__docs.md

version: 2

sources:
  - name: csv
    description: Personal media collection exports loaded into BigQuery via bq load.
    database: personal-warehouse-495013
    schema: raw_personal
    tables:
      - name: goodreads
        description: Goodreads library export — books read and rated.
      - name: bookbuddy
        description: BookBuddy collection export — full book library with reading status and metadata.
      - name: letterboxd
        description: Letterboxd diary export — films watched with ratings.
      - name: moviebuddy
        description: MovieBuddy collection export — full movie and TV library with watch status and metadata.
      - name: musicbuddy
        description: MusicBuddy collection export — vinyl and album collection with ratings.
      - name: bandcamp_collection
        description: Bandcamp purchased collection loaded from the internal fan collection API.
      - name: bandcamp_wishlist
        description: Bandcamp wishlist loaded from the internal fan collection API.

models:
  - name: stg_csv__goodreads
    description: >
      Goodreads library export, cleaned and typed.
      Renames columns to snake_case, casts types, and strips Excel-style ISBN encoding.
    config:
      tags: ["staging", "books"]
    columns:
      - name: book_id
        description: Unique Goodreads book identifier.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Book title.
        data_tests:
          - not_null
      - name: author
        description: Primary author name.
      - name: year_published
        description: Year the edition was published.
      - name: publisher
        description: Publisher name.
      - name: isbn
        description: ISBN, with Excel ="..." encoding stripped.
      - name: rating
        description: Personal rating on a 1–5 scale. 0 means unrated.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: source_name
        description: Hardcoded source identifier — always 'goodreads'.

  - name: stg_csv__bookbuddy
    description: >
      BookBuddy collection export, cleaned and typed.
      Selects title, author, genre, category, status, rating, ISBN, and tags.
      Rows where category = 'Manga' are routed to the manga domain downstream.
    config:
      tags: ["staging", "books"]
    columns:
      - name: book_id
        description: Surrogate key derived from title, author, and isbn — distinguishes different editions of the same title.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Book title.
        data_tests:
          - not_null
      - name: author
        description: Primary author name.
      - name: genre
        description: Genre as entered in BookBuddy. Null if not set.
      - name: category
        description: User-defined category (e.g., Sports, Fiction). Null if not set.
      - name: status
        description: Reading status.
        data_tests:
          - accepted_values:
              arguments:
                values: ["Read", "Unread", "Reading", "Did Not Finish"]
      - name: rating
        description: Personal rating on a 0–5 scale. 0 means unrated.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: isbn
        description: ISBN. Null if not set.
      - name: tags
        description: Comma-separated user tags. Null if not set.

  - name: stg_csv__letterboxd
    description: >
      Letterboxd diary export, cleaned and typed.
      Contains watched films with date, rating, and Letterboxd URI.
    config:
      tags: ["staging", "movies"]
    columns:
      - name: movie_id
        description: Surrogate key derived from watched_date and film_name — unique per diary entry.
        data_tests:
          - unique
          - not_null
      - name: watched_date
        description: Date the film was logged as watched.
        data_tests:
          - not_null
      - name: film_name
        description: Film title as listed on Letterboxd.
        data_tests:
          - not_null
      - name: release_year
        description: Film release year.
      - name: letterboxd_uri
        description: Short URI to the Letterboxd film page.
      - name: rating
        description: Personal rating on a 0.5–5 scale (half-star increments). Null if unrated.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5

  - name: stg_csv__moviebuddy
    description: >
      MovieBuddy collection export, cleaned and typed.
      Covers both movies and TV shows, with rating, genres, directors, and TMDB ID.
      TV Show rows whose genres include Animation are routed to the anime domain
      downstream.
    config:
      tags: ["staging", "movies"]
    columns:
      - name: movie_id
        description: Surrogate key derived from title and release_year.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Title of the movie or TV show.
        data_tests:
          - not_null
      - name: content_type
        description: Media type — Movie or TV Show.
        data_tests:
          - accepted_values:
              arguments:
                values: ["Movie", "TV Show"]
      - name: release_year
        description: Release year of the movie or TV show.
      - name: rating
        description: Personal rating on a 0–5 scale. 0 means unrated.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: directors
        description: Comma-separated director names. Null if not set.
      - name: genres
        description: Comma-separated genres. Null if not set.
      - name: runtime_minutes
        description: Runtime in minutes.
      - name: tmdb_id
        description: TMDB identifier. Null if not matched.

  - name: stg_csv__musicbuddy
    description: >
      MusicBuddy collection export, cleaned and typed.
      Covers albums and releases with artist, genres, and Discogs ID.
    config:
      tags: ["staging", "music"]
    columns:
      - name: album_id
        description: Surrogate key derived from title, artist, and discogs_release_id — distinguishes different releases of the same album.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Album or release title.
        data_tests:
          - not_null
      - name: artist
        description: Primary artist name.
        data_tests:
          - not_null
      - name: genres
        description: Comma-separated genres (e.g., Rock, Jazz). Null if not set.
      - name: release_year
        description: Original release year.
      - name: discogs_release_id
        description: Discogs release identifier. Null if not matched.
      - name: rating
        description: Personal rating on a 0–5 scale. 0 means unrated.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5

  - name: stg_csv__bandcamp_collection
    description: >
      Bandcamp purchased collection from the internal fan collection API,
      cleaned and typed. The raw_json column is intentionally retained because
      the source API is undocumented and can change without notice.
    config:
      tags: ["staging", "music", "bandcamp"]
    columns:
      - name: album_id
        description: Surrogate key derived from title, artist, and item_url.
        data_tests:
          - unique
          - not_null
      - name: item_id
        description: Bandcamp item identifier when present.
      - name: item_type
        description: Bandcamp item type, typically album or track.
      - name: tralbum_id
        description: Bandcamp track-or-album identifier when present.
      - name: tralbum_type
        description: Bandcamp track-or-album type when present.
      - name: title
        description: Album or track title.
        data_tests:
          - not_null
      - name: artist
        description: Artist or band name.
        data_tests:
          - not_null
      - name: item_url
        description: Bandcamp item URL.
      - name: art_url
        description: Artwork URL returned by Bandcamp.
      - name: token
        description: Pagination token returned on the item.
      - name: added_at
        description: Source timestamp-like field when returned by Bandcamp.
      - name: raw_json
        description: Raw item payload preserved for future field inspection.
      - name: _extracted_at
        description: Timestamp when the ingestion script fetched the row.

  - name: stg_csv__bandcamp_wishlist
    description: >
      Bandcamp wishlist from the internal fan collection API, cleaned and typed.
      The raw_json column is intentionally retained because the source API is
      undocumented and can change without notice.
    config:
      tags: ["staging", "music", "bandcamp"]
    columns:
      - name: album_id
        description: Surrogate key derived from title, artist, and item_url.
        data_tests:
          - unique
          - not_null
      - name: item_id
        description: Bandcamp item identifier when present.
      - name: item_type
        description: Bandcamp item type, typically album or track.
      - name: tralbum_id
        description: Bandcamp track-or-album identifier when present.
      - name: tralbum_type
        description: Bandcamp track-or-album type when present.
      - name: title
        description: Album or track title.
        data_tests:
          - not_null
      - name: artist
        description: Artist or band name.
        data_tests:
          - not_null
      - name: item_url
        description: Bandcamp item URL.
      - name: art_url
        description: Artwork URL returned by Bandcamp.
      - name: token
        description: Pagination token returned on the item.
      - name: added_at
        description: Source timestamp-like field when returned by Bandcamp.
      - name: raw_json
        description: Raw item payload preserved for future field inspection.
      - name: _extracted_at
        description: Timestamp when the ingestion script fetched the row.
