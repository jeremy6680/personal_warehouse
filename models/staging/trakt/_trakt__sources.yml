version: 2

sources:
  - name: trakt
    description: >
      Trakt public profile data fetched via the Trakt API v2.
      Written to BigQuery raw_personal by scripts/trakt_to_bq.py (full refresh on each run).
    database: personal-warehouse-495013
    schema: raw_personal
    tables:
      - name: trakt_watched_movies
        description: Movies watched by the Trakt user.
      - name: trakt_watched_shows
        description: Shows watched by the Trakt user.
      - name: trakt_ratings
        description: Movie and show ratings from the Trakt user.
