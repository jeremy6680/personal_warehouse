version: 2

sources:
  - name: trakt
    description: >
      Trakt public profile data fetched via the Trakt API v2.
      Written to BigQuery raw_personal by scripts/trakt_to_bq.py (full refresh on each run).
    database: personal-warehouse-495013
    schema: raw_personal
    tables:
      - name: trakt_watched_movies
        description: Movies watched by the Trakt user.
      - name: trakt_watched_shows
        description: Shows watched by the Trakt user.
      - name: trakt_ratings
        description: Movie and show ratings from the Trakt user.

models:
  - name: stg_trakt__watched_movies
    description: Trakt watched movies, cleaned and typed.
    config:
      tags: ["staging", "movies", "trakt"]
    columns:
      - name: movie_id
        description: Surrogate key derived from title and release_year.
        data_tests:
          - unique
          - not_null
      - name: trakt_movie_id
        description: Trakt movie identifier.
      - name: title
        description: Movie title.
        data_tests:
          - not_null
      - name: release_year
        description: Movie release year.
      - name: watch_count
        description: Number of Trakt plays for the movie.
      - name: last_watched_at
        description: Most recent Trakt watched timestamp.
      - name: genres
        description: JSON array of Trakt movie genres.
      - name: runtime_minutes
        description: Runtime in minutes from Trakt.
      - name: tmdb_id
        description: TMDB identifier from Trakt.
      - name: imdb_id
        description: IMDb identifier from Trakt.
      - name: _extracted_at
        description: Timestamp when this row was written to BigQuery by the ingestion script.
        data_tests:
          - not_null

  - name: stg_trakt__watched_shows
    description: Trakt watched shows, cleaned and typed.
    config:
      tags: ["staging", "anime", "trakt"]
    columns:
      - name: show_id
        description: Surrogate key derived from title and release_year.
        data_tests:
          - unique
          - not_null
      - name: trakt_show_id
        description: Trakt show identifier.
      - name: title
        description: Show title.
        data_tests:
          - not_null
      - name: release_year
        description: Show release year.
      - name: watch_count
        description: Number of Trakt plays for the show.
      - name: last_watched_at
        description: Most recent Trakt watched timestamp.
      - name: genres
        description: JSON array of Trakt show genres.
      - name: runtime_minutes
        description: Runtime in minutes from Trakt.
      - name: status
        description: Show status from Trakt.
      - name: network
        description: Show network from Trakt.
      - name: tmdb_id
        description: TMDB identifier from Trakt.
      - name: imdb_id
        description: IMDb identifier from Trakt.
      - name: _extracted_at
        description: Timestamp when this row was written to BigQuery by the ingestion script.
        data_tests:
          - not_null

  - name: stg_trakt__ratings
    description: >
      Trakt ratings for movies and shows. {{ doc("trakt_rating_scale") }}
    config:
      tags: ["staging", "movies", "anime", "trakt"]
    columns:
      - name: rating_id
        description: Surrogate key derived from media_type, title, and release_year.
        data_tests:
          - unique
          - not_null
      - name: media_type
        description: Rated media type.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["movie", "show"]
      - name: title
        description: Rated title.
        data_tests:
          - not_null
      - name: release_year
        description: Release year.
      - name: rating_raw
        description: Trakt personal rating on the native 1-10 scale.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 10
      - name: rating
        description: Trakt personal rating normalized to the warehouse 0.5-5 scale.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: rated_at
        description: Timestamp when the item was rated in Trakt.
      - name: trakt_id
        description: Trakt movie or show identifier.
      - name: genres
        description: JSON array of Trakt genres.
      - name: _extracted_at
        description: Timestamp when this row was written to BigQuery by the ingestion script.
        data_tests:
          - not_null
