version: 2

models:
  # ── Books ─────────────────────────────────────────────────────────────────

  - name: mrt_books__collection
    description: >
      Full book collection. Single unified rating: Goodreads is the source of
      truth when both sources have a rating, otherwise BookBuddy rating is used.
      rating is null for unrated books. genre is the normalised French label from
      the genre_mapping seed (ADR-022). status removed per ADR-025.
      source indicates which app(s) contributed the row.
    config:
      tags: ["mart", "books"]
    columns:
      - name: book_id
        description: Surrogate key derived from title + author. Consistent across sources.
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int_books__unified')
                field: book_id
      - name: title
        description: Book title.
        data_tests:
          - not_null
      - name: author
        description: Primary author name.
      - name: genre
        description: >
          Normalised French genre label from the genre_mapping seed (ADR-022).
          Null for Goodreads-only rows, or when the raw BookBuddy genre is a
          parasitic tag (e.g. "In library", "Internet Archive Wishlist").
      - name: category
        description: User-defined category from BookBuddy. Null for Goodreads-only rows.
      - name: rating
        description: >
          Unified personal rating on a 1–5 scale. Goodreads rating is used when
          available; otherwise BookBuddy rating is used. Null if the book is unrated
          in both sources.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: is_rated
        description: True if rating is not null.
      - name: year_published
        description: Publication year from Goodreads. Null for BookBuddy-only rows.
      - name: publisher
        description: Publisher name from Goodreads. Null for BookBuddy-only rows.
      - name: isbn
        description: ISBN. From BookBuddy when present, otherwise from Goodreads.
      - name: tags
        description: Comma-separated user tags from BookBuddy. Null for Goodreads-only rows.
      - name: country
        description: >
          Country of the author in French, translated via the country_name_fr seed
          (ADR-026). Falls back to the English value from author_countries if no
          French translation exists. Null if the author has no entry in author_countries.
      - name: source
        description: >
          Which app(s) contributed this row.
          'bookbuddy_and_goodreads' — matched across both sources.
          'goodreads' — only in Goodreads export.
          'bookbuddy' — only in BookBuddy.
        data_tests:
          - accepted_values:
              arguments:
                values: ["bookbuddy_and_goodreads", "goodreads", "bookbuddy"]
      - name: goodreads_id
        description: Goodreads string book ID. Null for BookBuddy-only rows.

  # ── Movies ────────────────────────────────────────────────────────────────

  - name: mrt_movies__collection
    description: >
      Full movie collection — watched and wishlist items. Single unified rating is
      resolved upstream with priority Trakt > Letterboxd > MovieBuddy > manual fallback.
      rating is null for unrated items.
      source indicates which app(s) contributed the row.
    config:
      tags: ["mart", "movies"]
    columns:
      - name: movie_id
        description: Surrogate key derived from title + release_year.
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int_movies__unified')
                field: movie_id
      - name: title
        description: Film or show title.
        data_tests:
          - not_null
      - name: content_type
        description: Media type from MovieBuddy (Movie or TV Show). Null for Letterboxd-only rows.
        data_tests:
          - accepted_values:
              arguments:
                values: ["Movie", "TV Show"]
              config:
                where: "content_type IS NOT NULL"
      - name: release_year
        description: Release year.
      - name: is_watched
        description: True if the item has at least one Letterboxd diary entry.
      - name: first_watched_date
        description: Earliest Letterboxd diary entry date. Null for unwatched items.
      - name: last_watched_date
        description: Most recent Letterboxd diary entry date. Null for unwatched items.
      - name: rating
        description: >
          Unified personal rating on a 0.5–5 scale. Letterboxd rating is used when
          available; otherwise MovieBuddy rating is used. Null if the item is unrated
          in both sources.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: is_rated
        description: True if rating is not null.
      - name: directors
        description: Comma-separated director names from MovieBuddy. Null for Letterboxd-only rows.
      - name: genres
        description: >
          Normalised French genre labels from the genre_mapping seed (ADR-022),
          comma-separated. Parasitic or unmapped tokens are dropped.
          Null for Letterboxd-only rows, which carry no genre data from MovieBuddy.
      - name: runtime_minutes
        description: Runtime in minutes from MovieBuddy. Null for Letterboxd-only rows.
      - name: tmdb_id
        description: TMDB identifier from MovieBuddy. Null for Letterboxd-only rows.
      - name: letterboxd_uri
        description: Letterboxd URI from the most recent diary entry. Null for unwatched items.
      - name: country
        description: >
          Country of the primary director in French, translated via the country_name_fr
          seed (ADR-026). Falls back to the English value if no French translation exists.
          Populated for MovieBuddy and matched rows via director_countries; for
          Letterboxd-only rows via film_countries on (title, release_year).
          Null if no matching entry exists in either seed.
      - name: source
        description: >
          Which app(s) contributed this row.
          Trakt, Letterboxd, and MovieBuddy combinations are possible.
          'letterboxd' — only in Letterboxd diary.
          'moviebuddy' — only in MovieBuddy collection.
          'trakt' — only in Trakt.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "trakt_and_letterboxd_and_moviebuddy",
                    "trakt_and_letterboxd",
                    "trakt_and_moviebuddy",
                    "letterboxd_and_moviebuddy",
                    "trakt",
                    "letterboxd",
                    "moviebuddy"
                  ]

  # ── Music ─────────────────────────────────────────────────────────────────

  - name: mrt_music__collection
    description: >
      Full album collection from MusicBuddy and Spotify, enriched with country.
      One row per album across both sources. artist is the display name with Discogs
      disambiguation suffix stripped for MusicBuddy rows; raw artists string for
      Spotify-only rows. rating is null for unrated albums (MusicBuddy stores 0 for
      unrated; Spotify carries no personal rating).
    config:
      tags: ["mart", "music"]
    columns:
      - name: album_id
        description: >
          Surrogate key. For MusicBuddy rows: derived from title + artist + discogs_release_id.
          For Spotify-only rows: derived from album_name + artists.
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int_music__unified')
                field: album_id
      - name: title
        description: Album or release title.
        data_tests:
          - not_null
      - name: artist
        description: Artist display name. Discogs disambiguation suffix stripped for MusicBuddy rows.
        data_tests:
          - not_null
      - name: genres
        description: >
          Normalised French genre labels from the genre_mapping seed (ADR-022),
          comma-separated. For MusicBuddy rows: derived from the Discogs genres
          string. For Spotify rows: derived from followed artist genres.
          Null if no mapped genres exist.
      - name: release_year
        description: Release year. Extracted from Spotify release_date string for Spotify rows.
      - name: discogs_release_id
        description: Discogs release identifier. Null for Spotify-only rows.
      - name: spotify_album_id
        description: Spotify native album identifier. Null for MusicBuddy-only rows.
      - name: total_tracks
        description: Total number of tracks on the album, from Spotify. Null for MusicBuddy-only rows.
      - name: spotify_added_at
        description: Timestamp when the album was saved to the Spotify library. Null for MusicBuddy-only rows.
      - name: rating
        description: Personal rating on a 0–5 scale. Null for unrated or Spotify-only albums.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: is_rated
        description: True if rating is not null.
      - name: country
        description: >
          Country of the artist in French, translated via the country_name_fr
          seed (ADR-026). Falls back to the English value from artist_countries
          if no French translation exists. Null if the artist has no entry in
          artist_countries.
      - name: source_name
        description: Data origin — 'musicbuddy', 'spotify', or 'both'.
        data_tests:
          - accepted_values:
              arguments:
                values: ["musicbuddy", "spotify", "both"]
      - name: media_format
        description: >
          Physical or digital format of the album, derived from source origin (ADR-021).
          'cd' — present in MusicBuddy only.
          'digital' — present in Spotify only.
          'cd, digital' — matched across both sources.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "cd"
                  - "vinyl"
                  - "digital"
                  - "cd, digital"
                  - "cd, vinyl"
                  - "vinyl, digital"
                  - "cd, vinyl, digital"

  # ── Cross-domain ──────────────────────────────────────────────────────────

  - name: mrt_media__country_index
    description: >
      Cross-domain country spine — one row per (country, domain, item). Links each
      country to all books, films, and albums associated with it. person_name is the
      author (books), primary director (movies), or artist (music). Only rows with
      a known country are included. Enables country-centric queries across all media
      types without joining three mart tables at query time.
    config:
      tags: ["mart", "cross_domain"]
    columns:
      - name: country
        description: >
          Country name in French, translated via the country_name_fr seed (ADR-026).
          Falls back to the English value from the domain seed (author_countries,
          director_countries, or artist_countries) if no French translation exists.
        data_tests:
          - not_null
      - name: domain
        description: Media domain — books, movies, or music.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["books", "movies", "music"]
      - name: item_id
        description: Domain-specific surrogate key (book_id, movie_id, or album_id).
        data_tests:
          - not_null
      - name: item_title
        description: Title of the book, film, or album.
        data_tests:
          - not_null
      - name: person_name
        description: Author (books), primary director (movies), or artist (music) associated with this item.
      - name: person_role
        description: Role of the person — 'author', 'director', or 'artist'.
        data_tests:
          - accepted_values:
              arguments:
                values: ["author", "director", "artist"]
      - name: rating
        description: Unified personal rating (null if unrated). Same scale as the domain mart.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ["country", "domain", "item_id"]

  - name: mrt_media__summary
    description: >
      Cross-domain aggregate — one row per media domain (books, movies, music).
      Summarises total item counts, consumed vs. pending items (read for books,
      watched for movies; null for music which has no consumption tracking),
      rated item counts, average unified rating, and country coverage.
    config:
      tags: ["mart", "cross_domain"]
    columns:
      - name: domain
        description: Media domain identifier.
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ["books", "movies", "music"]
      - name: total_items
        description: Total number of items in the collection for this domain.
        data_tests:
          - not_null
      - name: items_consumed
        description: >
          Items consumed: books read, movies watched.
          Null for music (no consumption tracking in MusicBuddy).
      - name: items_pending
        description: >
          Items not yet consumed: unread books, unwatched movies.
          Null for music.
      - name: items_rated
        description: Number of items with a non-null unified rating.
      - name: avg_rating
        description: Average unified rating across rated items. Null if no items are rated.
      - name: items_with_country
        description: Number of items where the author/director/artist country is known.
