# models/intermediate/_intermediate__models.yml
# Documentation: models/intermediate/_intermediate__docs.md

version: 2

models:
  - name: int_books__unified
    description: >
      Full union of BookBuddy and Goodreads, deduplicated to one row per book.
      Three cases: matched (both sources), bookbuddy_only, goodreads_only.
      Matching is attempted first on ISBN, then on normalized title + author.
      Author name variants are resolved before matching via the author_name_mapping
      seed (ADR-023). Manga are excluded — they flow into int_manga__unified (ADR-017).
      Genre is normalised to French via the genre_mapping seed (ADR-022).
      Manual ratings are applied as a last-resort fallback (ADR-024).
      Country name is translated to French via the country_name_fr seed (ADR-026).
      The book_id is always a title+author surrogate so it is consistent
      regardless of which source(s) a book comes from.
    config:
      tags: ["intermediate", "books"]
    columns:
      - name: book_id
        description: >
          Surrogate key derived from title + author (same formula as BookBuddy).
          For Goodreads-only rows the key is generated from the Goodreads title
          and author, ensuring uniqueness across the full union.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Book title. Sourced from BookBuddy when present, otherwise from Goodreads.
        data_tests:
          - not_null
      - name: author
        description: >
          Primary author name. Sourced from BookBuddy when present, otherwise from Goodreads.
          Raw value from the source — canonical form is resolved internally via
          author_name_mapping but the display value here is the original source string.
      - name: genre
        description: >
          Normalised French genre label from the genre_mapping seed (ADR-022).
          Null for Goodreads-only rows or if the raw genre has no mapping entry.
      - name: category
        description: >
          User-defined category from BookBuddy (e.g. Roman, Essai).
          Null for Goodreads-only rows. Manga rows are excluded from this model.
      - name: rating
        description: >
          Personal rating on a 0–5 scale. Sourced from BookBuddy when available;
          falls back to manual_ratings seed if the source rating is null (ADR-024).
          Null if neither source nor manual rating exists.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: isbn
        description: ISBN from BookBuddy, or from Goodreads for Goodreads-only rows.
      - name: tags
        description: Comma-separated user tags from BookBuddy. Null for Goodreads-only rows.
      - name: goodreads_id
        description: Goodreads string book ID. Null for BookBuddy-only rows.
      - name: year_published
        description: Publication year from Goodreads. Null for BookBuddy-only rows.
      - name: publisher
        description: Publisher name from Goodreads. Null for BookBuddy-only rows.
      - name: goodreads_rating
        description: Personal Goodreads rating (1–5 scale). Null for BookBuddy-only rows or if unrated.
      - name: match_type
        description: >
          Cross-source join strategy used to deduplicate this row.
          'isbn' — matched on ISBN.
          'title_author' — matched on normalized title + author (post name-normalisation).
          null — book found in only one source (no cross-source match).
      - name: country
        description: >
          Country of origin or nationality of the author, translated to French
          via the country_name_fr seed (ADR-026). Falls back to the English value
          from author_countries if no French translation exists. Null if the author
          has no entry in author_countries.

  - name: int_movies__unified
    description: >
      Full union of MovieBuddy, Letterboxd, and Trakt, deduplicated to one row
      per film. Letterboxd and Trakt watch history are aggregated before matching.
      Matching is on normalized title + release_year. The movie_id is always a
      title+release_year surrogate so it is consistent regardless of which
      source(s) a film comes from.
      Anime excluded — handled in int_anime__unified (ADR-017).
      Genres are normalised to French via the genre_mapping seed (ADR-022),
      applied per-token on the comma-separated genres string.
      Rating priority is Trakt > Letterboxd > MovieBuddy > manual fallback
      (ADR-019, ADR-024).
      Country name translated to French via the country_name_fr seed (ADR-026).
      country uses a two-tier lookup: director_countries seed on the primary
      director for matched and moviebuddy_only rows; film_countries seed on
      (title, release_year) for letterboxd_only rows, which carry no director data.
    config:
      tags: ["intermediate", "movies"]
    columns:
      - name: movie_id
        description: >
          Surrogate key derived from title + release_year (same formula as MovieBuddy).
          For Letterboxd-only rows the key is generated from film_name + release_year.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Film title. From MovieBuddy when present, otherwise from Letterboxd.
        data_tests:
          - not_null
      - name: content_type
        description: >
          Media type from MovieBuddy (Movie or TV Show). Null for Letterboxd-only rows.
          Anime TV Shows are excluded from this model — see int_anime__unified.
      - name: release_year
        description: Release year. Sourced from whichever source has the record.
      - name: rating
        description: >
          Personal rating on a 0–5 scale. Resolved with priority Trakt >
          Letterboxd > MovieBuddy > manual fallback.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: directors
        description: Comma-separated director names from MovieBuddy. Null for Letterboxd-only rows.
      - name: genres
        description: >
          Normalised French genre labels from the genre_mapping seed (ADR-022),
          re-aggregated as a comma-separated string. Parasitic or unmapped tokens
          are dropped. Null for Letterboxd-only rows, which carry no genre data.
      - name: runtime_minutes
        description: Runtime in minutes from MovieBuddy. Null for Letterboxd-only rows.
      - name: tmdb_id
        description: TMDB identifier from MovieBuddy. Null for Letterboxd-only rows.
      - name: first_watched_date
        description: Earliest watch date across all Letterboxd diary entries. Null for MovieBuddy-only rows.
      - name: last_watched_date
        description: Most recent watch date from Letterboxd. Null for MovieBuddy-only rows.
      - name: watch_count
        description: Total Trakt plays plus Letterboxd diary entries for this film. Null or 0 for unwatched rows.
      - name: trakt_rating
        description: Trakt rating normalized to the warehouse 0.5–5 scale.
      - name: trakt_rating_raw
        description: Native Trakt rating on the 1–10 scale.
      - name: trakt_rated_at
        description: Timestamp when the film was rated in Trakt.
      - name: trakt_movie_id
        description: Trakt movie identifier.
      - name: trakt_slug
        description: Trakt movie slug.
      - name: trakt_imdb_id
        description: IMDb identifier from Trakt.
      - name: letterboxd_rating
        description: Rating from the most recent Letterboxd diary entry. Null if unrated or MovieBuddy-only.
      - name: letterboxd_uri
        description: Letterboxd URI from the most recent diary entry. Null for MovieBuddy-only rows.
      - name: match_type
        description: >
          Cross-source join strategy.
          'title_year' — matched on normalized title + release_year.
          null — film found in only one source (no cross-source match).
      - name: source
        description: Source app or matched source combination that contributed the row.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  [
                    "trakt_and_letterboxd_and_moviebuddy",
                    "trakt_and_letterboxd",
                    "trakt_and_moviebuddy",
                    "letterboxd_and_moviebuddy",
                    "trakt",
                    "letterboxd",
                    "moviebuddy"
                  ]
      - name: country
        description: >
          Country of origin for the film, translated to French via the country_name_fr
          seed (ADR-026). Falls back to the English value if no French translation exists.
          For matched and moviebuddy_only rows: joined from director_countries on the
          primary director. For letterboxd_only rows: joined from film_countries on
          (title, release_year). Null if no matching entry exists in either seed.

  - name: int_anime__unified
    description: >
      Anime union from MovieBuddy animated TV shows and Trakt watched or rated
      shows. Matching is on normalized title + release_year. Rating priority is
      Trakt > MovieBuddy > manual fallback. Country is sourced from
      anime_director_countries when available, then Trakt country.
    config:
      tags: ["intermediate", "anime"]
    columns:
      - name: anime_id
        description: Surrogate key derived from title + release_year.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Anime title.
        data_tests:
          - not_null
      - name: content_type
        description: Media type, always TV Show.
        data_tests:
          - accepted_values:
              arguments:
                values: ["TV Show"]
      - name: release_year
        description: Release year.
      - name: rating
        description: Personal rating on a 0–5 scale, resolved with Trakt priority.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: genres
        description: Normalised French genre labels from the genre_mapping seed.
      - name: runtime_minutes
        description: Runtime in minutes from MovieBuddy or Trakt.
      - name: directors
        description: Comma-separated director names from MovieBuddy.
      - name: tmdb_id
        description: TMDB identifier from MovieBuddy or Trakt.
      - name: first_watched_date
        description: >
          Always null — the Trakt show-level API only exposes last_watched_at;
          first watch date is not available from this source.
      - name: last_watched_date
        description: Most recent Trakt watched date at show level.
      - name: watch_count
        description: Trakt show-level play count.
      - name: trakt_rating
        description: Trakt rating normalized to the warehouse 0.5–5 scale.
      - name: trakt_rating_raw
        description: Native Trakt rating on the 1–10 scale.
      - name: trakt_show_id
        description: Trakt show identifier.
      - name: status
        description: Show status from Trakt.
      - name: network
        description: Show network from Trakt.
      - name: source
        description: Source app or matched source combination that contributed the row.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["trakt_and_moviebuddy", "trakt", "moviebuddy"]
      - name: match_type
        description: "'title_year' when Trakt and MovieBuddy matched; null otherwise."
      - name: country
        description: >
          Country translated to French when possible. Source priority:
          anime_director_countries on primary MovieBuddy director, then Trakt country.

  - name: int_manga__unified
    description: >
      Manga collection from BookBuddy rows where category = 'Manga'. Genre is
      normalised via genre_mapping with domain = 'manga'. Manual ratings are
      applied as a fallback, and country is enriched from manga_author_countries.
    config:
      tags: ["intermediate", "manga"]
    columns:
      - name: manga_id
        description: Surrogate key inherited from the BookBuddy staging row.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Manga title.
        data_tests:
          - not_null
      - name: author
        description: Manga author.
      - name: genre
        description: Normalised French genre label from the genre_mapping seed.
      - name: category
        description: BookBuddy category, expected to be Manga.
        data_tests:
          - accepted_values:
              arguments:
                values: ["Manga"]
      - name: rating
        description: Personal rating on a 0–5 scale.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: isbn
        description: ISBN from BookBuddy.
      - name: tags
        description: Comma-separated user tags from BookBuddy.
      - name: country
        description: >
          Country of the author, translated to French via country_name_fr when
          a mapping exists.
      - name: source
        description: Source app that contributed the row.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bookbuddy"]

  - name: int_music__unified
    description: >
      Full union of MusicBuddy, Bandcamp collection/wishlist, and Spotify saved
      albums, deduplicated to one row per album. Matching is on
      normalized artist + title (single pass), with MusicBuddy > Bandcamp >
      Spotify metadata priority (ADR-020).
      Spotify album genres are enriched via a LEFT JOIN on followed_artists
      using the primary artist Spotify ID — album-level genres are almost
      always empty in the Spotify API.
      Genre normalised to French via the genre_mapping seed (ADR-022):
      comma-separated string for MusicBuddy rows, JSON array for Spotify rows.
      media_format tracks physical/digital origin per source (ADR-021):
      MusicBuddy → 'cd', Bandcamp/Spotify → 'digital', matched formats
      concatenate to values such as 'cd, digital'.
      Manual ratings applied as last-resort fallback (ADR-024).
      Country name translated to French via the country_name_fr seed (ADR-026).
      artist_display strips Discogs disambiguation suffixes for MusicBuddy rows.
    config:
      tags: ["intermediate", "music"]
    columns:
      - name: album_id
        description: >
          Surrogate key. For MusicBuddy rows: derived from title + artist +
          discogs_release_id (carried from staging). For Bandcamp/Spotify-only
          rows: derived from title + artist.
        data_tests:
          - unique
          - not_null
      - name: title
        description: Album or release title.
        data_tests:
          - not_null
      - name: artist
        description: >
          Raw artist name as it appears in the source. For MusicBuddy rows,
          includes Discogs disambiguation suffix (e.g. "Ayo (2)"). Used as
          the join key and for surrogate key stability. Use artist_display
          for reporting.
        data_tests:
          - not_null
      - name: artist_display
        description: >
          Artist name with Discogs disambiguation suffix stripped
          (e.g. "Ayo (2)" → "Ayo"). For Bandcamp/Spotify-only rows, identical to artist.
          Use this column for display and reporting.
      - name: genres
        description: >
          Normalised French genre labels from the genre_mapping seed (ADR-022),
          re-aggregated as a comma-separated string. Parasitic or unmapped tokens
          are dropped. For MusicBuddy rows: derived from the comma-separated genres
          string. For Spotify rows: derived from the JSON array genres on the
          followed artist. Null if no mapped genres exist.
      - name: release_year
        description: >
          Release year. For Spotify rows: extracted from the variable-precision
          release_date string (YYYY, YYYY-MM, or YYYY-MM-DD).
      - name: discogs_release_id
        description: Discogs release identifier. Null for rows not present in MusicBuddy.
      - name: spotify_album_id
        description: Spotify native album identifier. Null for MusicBuddy-only rows.
      - name: total_tracks
        description: Total number of tracks on the album, from Spotify. Null for MusicBuddy-only rows.
      - name: spotify_added_at
        description: Timestamp when the album was saved to the Spotify library. Null for MusicBuddy-only rows.
      - name: bandcamp_item_id
        description: Bandcamp item identifier. Null for rows not present in the Bandcamp collection.
      - name: bandcamp_item_url
        description: Bandcamp item URL. Null for rows not present in the Bandcamp collection.
      - name: bandcamp_added_at
        description: Source timestamp-like field returned by Bandcamp. Null for rows not present in the Bandcamp collection.
      - name: bandcamp_origin
        description: >
          Bandcamp origin for this album: collection, wishlist, or collection, wishlist.
          Wishlist is included because adding an album there means it was listened to
          and liked.
      - name: rating
        description: >
          Personal rating on a 0–5 scale. Sourced from MusicBuddy when available;
          falls back to manual_ratings seed if the source rating is null (ADR-024).
          Null for Bandcamp/Spotify-only rows unless a manual rating exists.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: country
        description: >
          Country of origin or nationality of the artist, translated to French
          via the country_name_fr seed (ADR-026). Falls back to the English value
          from artist_countries if no French translation exists. Null if the artist
          has no entry in artist_countries.
      - name: source_name
        description: >
          Data origin.
          Values identify the source app or source combination contributing the row.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  [
                    "musicbuddy_and_bandcamp_and_spotify",
                    "musicbuddy_and_bandcamp",
                    "musicbuddy_and_spotify",
                    "bandcamp_and_spotify",
                    "musicbuddy",
                    "bandcamp",
                    "spotify"
                  ]
      - name: match_type
        description: >
          Cross-source join strategy.
          'title_artist' — matched on normalized title + artist.
          null — album found in only one source.
      - name: media_format
        description: >
          Physical or digital format of the album, derived from source origin (ADR-021).
          'cd' — present in MusicBuddy only.
          'digital' — present in Bandcamp and/or Spotify only.
          'cd, digital' — matched across both sources.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "cd"
                  - "vinyl"
                  - "digital"
                  - "cd, digital"
                  - "cd, vinyl"
                  - "vinyl, digital"
                  - "cd, vinyl, digital"
